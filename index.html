<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Wrap'n'Join</title>
</head>

<body class="container my-5">
    <h1 class="text-center mb-4">Wrap'n'Join</h1>
    <div class="input-group mb-3">
        <span class="input-group-text w-25">Source list</span>
        <textarea class="form-control" aria-label="Source list">Lorem ipsum dolor sit amet consectetur adipisicing elit</textarea>
    </div>
    <div class="input-group mb-3 w-50">
        <span class="input-group-text w-50">Separator</span>
        <input type="text" class="form-control text-center" aria-label="Source list separator" value=" ">
    </div>
    <div class="input-group mb-3 w-50">
        <span class="input-group-text w-50">Wrap with</span>
        <input type="text" class="form-control text-center" aria-label="Wrap with before" value="{">
        <input type="text" class="form-control text-center" aria-label="Wrap with after" value="}">
    </div>
    </div>
    <div class="input-group mb-3 w-50">
        <span class="input-group-text w-50">Join with</span>
        <input type="text" class="form-control text-center" aria-label="Join with" value=", ">
    </div>
    <div class="input-group mb-3">
        <span class="input-group-text w-25">Wrapped'n'Joined</span>
        <textarea class="form-control" aria-label="Wrapped'n'Joined"></textarea>
    </div>
</body>

</html>
